<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DelCookies</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <div class="cookie-icon">🍪</div>
      <h1 class="title">DelCookies</h1>
      <p class="subtitle">Limpe os cookies do site atual</p>
    </header>

    <!-- SEÇÃO: SITE ATUAL -->
    <section class="current-site-section">
      <div class="site-badge" id="site-badge">
        <span class="icon">🌐</span>
        <span class="domain" id="current-site">Carregando...</span>
      </div>
    </section>

    <!-- SEÇÃO: AÇÃO -->
    <section class="action-section">
      <button id="btn-delete" type="button">
        <span class="btn-text">🗑️ Limpar Cookies deste Site</span>
        <span class="btn-loading hidden">
          <span class="spinner"></span>
          Limpando...
        </span>
      </button>
    </section>

    <!-- SEÇÃO: RESULTADO -->
    <section class="result-section">
      <div id="result-message" class="result hidden"></div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
      <span class="version">v1.0.0</span>
      <span class="license">DelCookies — MIT License</span>
    </footer>

  </div>

  <script src="popup.js"></script>
</body>
</html>
